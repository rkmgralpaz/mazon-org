<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Postcards Wall</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>

        <!-- WALL -->
        <div id="wall-container">
            <div id="wall-canvas"></div>

            <!-- Zoom controls -->
            <div class="zoom-controls">
                <button id="zoom-in-btn" class="zoom-btn" aria-label="Zoom in">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M7.995 1V15" stroke="white" stroke-width="2" stroke-linecap="round" />
                        <path d="M1 8.00586L15 8.00586" stroke="white" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
                <button id="zoom-out-btn" class="zoom-btn" aria-label="Zoom out">
                    <svg width="16" height="2" viewBox="0 0 16 2" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M1 1L15 0.999999" stroke="white" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- SLIDER MODAL (3-card with flip) -->
        <div id="slider-modal" tabindex="-1" aria-modal="true" role="dialog" aria-label="Postcard viewer">

            <button id="slider-close" aria-label="Back to wall">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="12" viewBox="0 0 18 12" fill="none">
                    <path d="M0.264238 6.20072C-0.0881334 5.81795 -0.0881334 5.22893 0.264238 4.84615L4.42844 0.322661C4.82456 -0.107635 5.50379 -0.107627 5.8999 0.322681L6.10502 0.545514C6.45737 0.928283 6.45737 1.51727 6.10502 1.90004L3.87584 4.32169L16.6407 4.32169C17.193 4.32169 17.6407 4.76941 17.6407 5.32169L17.6407 5.72518C17.6407 6.27747 17.193 6.72518 16.6407 6.72518L3.87584 6.72518L6.10502 9.14683C6.45737 9.5296 6.45737 10.1186 6.10502 10.5014L5.8999 10.7242C5.50379 11.1545 4.82456 11.1545 4.42844 10.7242L0.264238 6.20072Z" fill="#00345D"/>
                </svg>
                <span>Back</span>
            </button>

            <div id="slider-track">
                <!-- Pool cards created dynamically by JS -->
            </div>

            <!-- Prev / Next buttons — bottom-left, same style as wall controls -->
            <div id="slider-nav">
                <button id="slider-prev" aria-label="Previous postcard">
                    <img src="icons/arrow-prev.svg" alt="" width="20" height="12" aria-hidden="true">
                </button>
                <button id="slider-next" aria-label="Next postcard">
                    <img src="icons/arrow-next.svg" alt="" width="20" height="12" aria-hidden="true">
                </button>
            </div>

            <div id="slider-counter">
                <span id="slider-current">1</span> / <span id="slider-total">100</span>
            </div>

            <!-- Screen reader live region for postcard navigation announcements -->
            <div id="slider-live" aria-live="polite" aria-atomic="true"></div>

        </div>

        <script src="postcards-alts-data.js"></script>
        <script src="app.js"></script>
    </body>

</html>
